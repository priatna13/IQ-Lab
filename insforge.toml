[auth]
# Soft-launch: tambah URL production (https://<domain>/api/auth/callback, /masuk, /dashboard)
# lalu config apply. Google OAuth juga butuh redirect URI di Google Cloud + InsForge Auth Methods.
allowed_redirect_urls = [
  "http://localhost:3000/api/auth/callback",
  "http://localhost:3000/masuk",
  "http://localhost:3000/daftar",
  "http://localhost:3000/dashboard",
  "http://127.0.0.1:3000/api/auth/callback",
  "http://127.0.0.1:3000/masuk",
  "https://6a6g33ic.insforge.site/api/auth/callback",
  "https://6a6g33ic.insforge.site/masuk",
  "https://6a6g33ic.insforge.site/daftar",
  "https://6a6g33ic.insforge.site/dashboard",
  "https://iqlab.insforge.site/api/auth/callback",
  "https://iqlab.insforge.site/masuk",
  "https://iqlab.insforge.site/daftar",
  "https://iqlab.insforge.site/dashboard",
]
# MVP lokal: verifikasi email dimatikan agar daftar bisa diuji tanpa SMTP.
# Production public: pertimbangkan require_email_verification = true + [auth.smtp] enabled.
# Soft-launch internal: boleh tetap false. Lihat docs/SOFT-LAUNCH-OPS.md (A3).
require_email_verification = false
verify_email_method = "code"
reset_password_method = "code"
disable_signup = false

[auth.password]
min_length = 6
require_number = false
require_lowercase = false
require_uppercase = false
require_special_char = false

[auth.smtp]
enabled = false
host = ""
port = 465
username = ""
sender_email = ""
sender_name = ""
min_interval_seconds = 60

[storage]
max_file_size_mb = 50

[realtime]
retention_days = 0

[schedules]
retention_days = 7
